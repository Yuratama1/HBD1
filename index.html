<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Happy Birthday ❤️</title>
  <link rel="stylesheet" href="style.css" />
  <!-- confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <!-- dekorasi tulip biru (posisi absolute, ditambahkan via HTML) -->
  <div id="decor-tulips" aria-hidden="true">
    <!-- small tulip svgs -->
    <svg class="tulip tulip-1" viewBox="0 0 64 64" width="60" height="60" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" fill-rule="evenodd">
        <path d="M32 4c8 0 14 7 14 14 0 0-6 2-14 2s-14-2-14-2c0-7 6-14 14-14z" fill="#7db7ff"/>
        <path d="M20 28s4 10 12 10 12-10 12-10-6 6-12 6S20 28 20 28z" fill="#cfe9ff"/>
        <path d="M32 22v38" stroke="#2e86ff" stroke-width="2" stroke-linecap="round"/>
      </g>
    </svg>

    <svg class="tulip tulip-2" viewBox="0 0 64 64" width="48" height="48" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" fill-rule="evenodd">
        <path d="M32 6c6 0 11 5 11 11 0 0-5 2-11 2s-11-2-11-2c0-6 5-11 11-11z" fill="#9fd3ff"/>
        <path d="M24 28s4 8 8 8 8-8 8-8-4 4-8 4-8-4-8-4z" fill="#e9f6ff"/>
        <path d="M32 22v36" stroke="#3388ff" stroke-width="2" stroke-linecap="round"/>
      </g>
    </svg>
  </div>

  <div id="hearts-container" aria-hidden="true"></div>

  <audio id="bg-music" loop preload="auto">
    <!-- ganti ke file lokal jika mau -->
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-11912.mp3" type="audio/mp3">
  </audio>

  <!-- Aplikasi -->
  <main id="app">
    <!-- LOGIN -->
    <section id="login-screen" class="screen active">
      <h1>Hai Sayang ❤️</h1>
      <p class="login-instr">Masukkan nama dan tanggal lahir</p>
      <input type="text" id="nama" placeholder="Nama kamu" autocomplete="off" />
      <input type="date" id="tanggal" />
      <div class="btn-row">
        <button type="button" id="btn-masuk">Masuk</button>
      </div>
    </section>

    <!-- GAME -->
    <section id="game-screen" class="screen">
      <h2>Cari pasangan kartu 🎴</h2>
      <p class="hint">Temukan pasangan emoji. Jika menemukan kartu spesial (🦷), langsung ke kue!</p>
      <div id="game-board" role="grid" aria-label="Papan permainan"></div>
      <div class="btn-row">
        <button type="button" id="btn-restart-game">Mulai Ulang</button>
        <button type="button" id="btn-back-to-login">Kembali</button>
      </div>
    </section>

    <!-- CAKE -->
    <section id="cake-screen" class="screen">
      <h1>Selamat Ulang Tahun 🎂</h1>
      <div id="cake-container" aria-hidden="false">
        <!-- SVG kue pastel biru dengan tulip -->
        <svg id="cake-svg" viewBox="0 0 400 300" width="320" height="240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustrasi kue ulang tahun">
          <!-- base -->
          <rect x="60" y="120" rx="28" ry="28" width="280" height="110" fill="#cfe9ff"/>
          <!-- frosting -->
          <path d="M60 120 q40 -40 80 0 t80 0 t80 0" fill="#eaf6ff"/>
          <!-- layer -->
          <rect x="80" y="150" width="240" height="60" rx="18" fill="#a3d2ff"/>
          <!-- candle -->
          <rect x="192" y="90" width="16" height="40" rx="4" fill="#fff"/>
          <circle cx="200" cy="82" r="8" fill="#ffd36b"/>
          <!-- tulip decoration left -->
          <g transform="translate(110,145) scale(0.7)">
            <path d="M12 2 C18 -2 28 0 34 8 C30 18 18 22 12 20 C6 18 4 8 12 2 Z" fill="#7db7ff"/>
            <rect x="18" y="20" width="4" height="28" fill="#2e86ff"/>
          </g>
          <!-- tulip decoration right -->
          <g transform="translate(270,145) scale(0.7)">
            <path d="M12 2 C18 -2 28 0 34 8 C30 18 18 22 12 20 C6 18 4 8 12 2 Z" fill="#7db7ff"/>
            <rect x="18" y="20" width="4" height="28" fill="#2e86ff"/>
          </g>
        </svg>
      </div>

      <div class="btn-row">
        <button type="button" id="btn-blow">Tiup Lilin</button>
        <button type="button" id="btn-back-to-game">Kembali ke Permainan</button>
      </div>
    </section>

    <!-- SURPRISE -->
    <section id="surprise-screen" class="screen">
      <h1>Untuk Kamu ❤️</h1>
      <div id="typing-text" class="typing-text" aria-live="polite"></div>
      <div id="sig-text" class="sig-text">— Dari aku yang selalu sayang kamu ❤️</div>
      <div class="btn-row">
        <button type="button" id="btn-play-again">Ulangi</button>
        <button type="button" id="btn-to-login">Ke Halaman Awal</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
