<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Special Day 💙</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <div id="decor-plants" aria-hidden="true">
    <svg class="plant left" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#569b89" stroke-width="3" stroke-linecap="round">
        <path d="M50 200 Q 50 150 40 80" fill="none"/>
        <path d="M50 200 Q 60 160 80 120" fill="none"/>
        <path d="M50 200 Q 30 170 15 140" fill="none"/>
      </g>
      <path d="M40 80 C 35 60, 45 40, 40 40 C 35 40, 30 60, 40 80 Z" fill="#71b1fc"/>
      <path d="M40 80 C 45 60, 35 40, 40 40 C 45 40, 50 60, 40 80 Z" fill="#93c9ff"/>
      <path d="M80 120 C 75 105, 85 90, 80 90 C 75 90, 70 105, 80 120 Z" fill="#71b1fc"/>
      <path d="M80 120 C 85 105, 75 90, 80 90 C 85 90, 90 105, 80 120 Z" fill="#93c9ff"/>
      <path d="M15 140 C 10 125, 20 110, 15 110 C 10 110, 5 125, 15 140 Z" fill="#71b1fc"/>
      <path d="M15 140 C 20 125, 10 110, 15 110 C 20 110, 25 125, 15 140 Z" fill="#93c9ff"/>
    </svg>

    <svg class="plant right" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#569b89" stroke-width="3" stroke-linecap="round">
        <path d="M50 200 Q 50 150 60 80" fill="none"/>
        <path d="M50 200 Q 40 160 20 120" fill="none"/>
        <path d="M50 200 Q 70 170 85 140" fill="none"/>
      </g>
      <path d="M60 80 C 65 60, 55 40, 60 40 C 65 40, 70 60, 60 80 Z" fill="#71b1fc"/>
      <path d="M60 80 C 55 60, 65 40, 60 40 C 55 40, 50 60, 60 80 Z" fill="#93c9ff"/>
      <path d="M20 120 C 25 105, 15 90, 20 90 C 25 90, 30 105, 20 120 Z" fill="#71b1fc"/>
      <path d="M20 120 C 15 105, 25 90, 20 90 C 15 90, 10 105, 20 120 Z" fill="#93c9ff"/>
      <path d="M85 140 C 90 125, 80 110, 85 110 C 90 110, 95 125, 85 140 Z" fill="#71b1fc"/>
      <path d="M85 140 C 80 125, 90 110, 85 110 C 80 110, 75 125, 85 140 Z" fill="#93c9ff"/>
    </svg>
  </div>

  <div id="hearts-container" aria-hidden="true"></div>

  <audio id="bg-music" loop preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-11912.mp3" type="audio/mp3">
  </audio>

  <main id="app">
    <section id="login-screen" class="screen active">
      <div class="login-card">
        <div class="icon-sparkle-container">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            <path d="M3 12a9 9 0 1 0 18 0 9 9 0 1 0-18 0"></path>
          </svg>
        </div>
        
        <h1 class="serif-title">Special Day</h1>
        <p class="subtitle">Ada kejutan buat kamu 💙</p>

        <div class="form-group">
          <label>Nama Panggilan</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input type="text" id="nama" placeholder="Siapa namamu?" autocomplete="off" />
          </div>
        </div>

        <div class="form-group">
          <label>Tanggal Lahir</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <input type="date" id="tanggal" />
          </div>
        </div>

        <button type="button" id="btn-masuk" class="btn-primary">Masuk ❤</button>
      </div>
    </section>

    <section id="game-screen" class="screen">
      <h1 class="serif-title">Main Sebentar ✨</h1>
      <p class="subtitle">Temukan pasangan emoji. (Cari gigi 🦷 untuk lanjut!)</p>
      <div id="game-board" role="grid" aria-label="Papan permainan"></div>
      <div class="btn-row" style="margin-top:20px;">
        <button type="button" id="btn-restart-game" class="btn-outline">Ulangi</button>
      </div>
    </section>

    <section id="cake-screen" class="screen">
      <h1 class="serif-title" style="font-size:36px; margin-bottom: 2rem;">Make a Wish! ✨💙</h1>

      <div class="cake-container">
        <svg viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg" style="width:100%; max-width: 320px; display:block; margin: 0 auto;">
          <defs>
            <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffcc00"/>
              <stop offset="100%" stop-color="#ff6600"/>
            </linearGradient>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="4" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>

          <rect x="30" y="200" width="240" height="16" rx="8" fill="#d1e0f0" />

          <rect x="55" y="140" width="190" height="60" rx="8" fill="#88c3ff" />
          <circle cx="85" cy="180" r="5" fill="#aed6ff" opacity="0.6"/>
          <circle cx="110" cy="155" r="4" fill="#aed6ff" opacity="0.6"/>
          <circle cx="150" cy="185" r="3.5" fill="#aed6ff" opacity="0.6"/>
          <circle cx="190" cy="165" r="6" fill="#aed6ff" opacity="0.6"/>
          <circle cx="225" cy="180" r="4.5" fill="#aed6ff" opacity="0.6"/>

          <rect x="85" y="90" width="130" height="50" rx="6" fill="#f4f8fc" />
          
          <path d="M 85 140 Q 95 155 105 140 Q 115 160 125 140 Q 135 150 145 140 Q 155 160 165 140 Q 175 155 185 140 Q 195 150 205 140 Q 210 140 215 140 L 215 90 L 85 90 Z" fill="#f4f8fc"/>

          <rect x="143" y="45" width="14" height="45" fill="#e4effb" rx="2" />
          <path d="M 143 55 L 157 65 M 143 65 L 157 75 M 143 75 L 157 85" stroke="#9bcaff" stroke-width="3" opacity="0.5"/>

          <path d="M 150 20 C 145 30, 140 40, 150 45 C 160 40, 155 30, 150 20 Z" fill="url(#flame)" filter="url(#glow)"/>
        </svg>
      </div>

      <div class="btn-row" style="margin-top: 30px;">
        <button type="button" id="btn-blow" class="btn-float">
          Tiup Lilin 
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:8px;">
            <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path>
          </svg>
        </button>
      </div>
    </section>

    <section id="surprise-screen" class="screen">
      <h1 class="serif-title">Happy Birthday 🎉</h1>
      <div id="typing-text" class="typing-text" aria-live="polite"></div>
      <div id="sig-text" class="sig-text">— Dari aku yang selalu sayang kamu ❤️</div>
      <div class="btn-row">
        <button type="button" id="btn-to-login" class="btn-outline">Kembali</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
